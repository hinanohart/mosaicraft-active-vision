name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-type-test:
    name: ${{ matrix.os }} · py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Check out repo (with submodules)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          submodules: recursive

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and dev extras
        run: |
          python -m pip install --upgrade pip
          # oklch-aug is a sibling repo (decision/007); pin to a SHA so
          # CI is reproducible. Bump when oklch-aug lands on PyPI.
          pip install "oklch-aug @ git+https://github.com/hinanohart/oklch-aug.git@7d869330d39885d497d19601df9d1a371a6fd24b"
          # mosaicraft is intentionally NOT pip-installed here — it
          # ships opencv-python while this repo pins
          # opencv-python-headless and they collide on cv2.
          pip install -e ".[dev,bench]"

      - name: Lint (ruff)
        run: ruff check src tests experiments

      - name: Type check (mypy on package)
        run: mypy src/mosaicraft_active_vision

      - name: Unit + property tests
        env:
          PYTHONPATH: src:external/mosaicraft/src
        run: pytest tests/ -q

      - name: License sanity (MIT header present)
        run: |
          test -f LICENSE
          grep -q "MIT License" LICENSE

      - name: Phase-1 benchmark smoke run (1 target, 4 NBV steps)
        env:
          PYTHONPATH: src:external/mosaicraft/src
          MOSAICRAFT_AV_BENCH_SMOKE: "1"
        run: python experiments/benchmark_phase1.py

  baseline-diff:
    name: Baseline JSON sanity
    runs-on: ubuntu-latest
    needs: lint-type-test
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Baseline JSON is non-empty and well-formed
        run: |
          python -c "
          import json, sys, pathlib
          p = pathlib.Path('experiments/results/phase1_baseline_2026-05-16.json')
          assert p.is_file(), f'baseline missing: {p}'
          d = json.loads(p.read_text())
          assert d['schema_version'] == 1, d
          assert d['summary'], 'empty summary'
          # A1_saliency must outperform A1_random in the committed baseline.
          s = d['summary']
          assert s['A1_saliency']['mean_final_ssim'] > s['A1_random']['mean_final_ssim'], \
              ('A1 gate broken in committed baseline', s)
          print('OK', list(s.keys()))
          "
